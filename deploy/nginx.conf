# /etc/nginx/sites-available/aiops
# 替換 YOUR_DOMAIN 為你的真實 domain（例如：aiops.example.com）

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其他流量 redirect HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    client_max_body_size 20M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 1024;

    # ── Backend API (direct to FastAPI, bypass Next.js proxy) ─────────
    location /api/v1/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Backend health & docs ─────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:8000;
    }
    location /docs {
        proxy_pass http://127.0.0.1:8000;
    }
    location /openapi.json {
        proxy_pass http://127.0.0.1:8000;
    }

    # ── WebSocket (Agent SSE via Next.js) ─────────────────────────────
    location /ws {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── OntologySimulator Static Frontend (Next.js export) ────────────
    location /simulator/ {
        alias /opt/aiops/ontology_simulator/frontend/out/;
        index index.html;
        add_header Cache-Control "public, max-age=3600";
    }

    location /simulator/_next/static/ {
        alias /opt/aiops/ontology_simulator/frontend/out/_next/static/;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── OntologySimulator WebSocket ───────────────────────────────────
    location /simulator/ws {
        proxy_pass         http://127.0.0.1:8012/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }

    # ── OntologySimulator REST API ────────────────────────────────────
    location /simulator-api/ {
        rewrite ^/simulator-api/(.*)$ /$1 break;
        proxy_pass         http://127.0.0.1:8012;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── AIOps App (Next.js — all other routes) ────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
