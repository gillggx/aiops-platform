name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      rebuild_simulator:
        description: 'Rebuild simulator frontend'
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            cd /opt/aiops
            ARGS=""
            if [ "${{ inputs.rebuild_simulator }}" = "true" ]; then
              ARGS="--rebuild-simulator-frontend"
            fi
            bash deploy/update.sh $ARGS
